document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"fe824bc2-8154-4173-8c56-eab32fb1abd7\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>\n    *{box-sizing:border-box;}\n    html,body{margin:0;height:100%;}\n    button{font-family:inherit;}\n    input{font-family:inherit;}\n    aside::-webkit-scrollbar{width:8px;}\n    aside::-webkit-scrollbar-thumb{background:#e2e2e2;border-radius:8px;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;height:100vh;min-height:600px;font-family:ui-monospace,'SF Mono',Menlo,monospace;background:#f4f4f2;color:#1d1d1d;\">\n\n  <aside style=\"width:300px;flex:none;height:100%;overflow-y:auto;background:#ffffff;border-right:1px solid #e9e9e7;padding:22px 20px;display:flex;flex-direction:column;gap:22px;\">\n\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;\">\n      <div style=\"font-size:15px;font-weight:700;letter-spacing:-.01em;\">Fretboard<\u002Fdiv>\n      <div style=\"font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#bcbcbc;\">dot maker<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9b9b9b;margin-bottom:8px;\">Title<\u002Fdiv>\n      <input value=\"{{ title }}\" onchange=\"{{ setTitle }}\" placeholder=\"Name this diagram\" style=\"width:100%;border:1px solid #e6e6e4;border-radius:9px;padding:10px 11px;font:600 14px/1.2 ui-monospace,Menlo,monospace;color:#1d1d1d;outline:none;background:#fafafa;\">\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9b9b9b;margin-bottom:8px;\">Orientation<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;\">\n        <button onclick=\"{{ setOrientH }}\" style=\"{{ orientHStyle }}\">Horizontal<\u002Fbutton>\n        <button onclick=\"{{ setOrientV }}\" style=\"{{ orientVStyle }}\">Vertical<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9b9b9b;margin-bottom:10px;display:flex;justify-content:space-between;\"><span>Fret window<\u002Fspan><span style=\"color:#cfcfcf;\">{{ fretRangeText }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font-size:13px;color:#666;\">Start fret<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:9px;\">\n            <button onclick=\"{{ startMinus }}\" style=\"width:28px;height:28px;border-radius:7px;border:1px solid #e6e6e4;background:#fff;cursor:pointer;font-size:16px;line-height:1;color:#444;\">−<\u002Fbutton>\n            <span style=\"min-width:20px;text-align:center;font-size:14px;font-weight:600;\">{{ startFret }}<\u002Fspan>\n            <button onclick=\"{{ startPlus }}\" style=\"width:28px;height:28px;border-radius:7px;border:1px solid #e6e6e4;background:#fff;cursor:pointer;font-size:16px;line-height:1;color:#444;\">+<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font-size:13px;color:#666;\">Frets shown<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:9px;\">\n            <button onclick=\"{{ countMinus }}\" style=\"width:28px;height:28px;border-radius:7px;border:1px solid #e6e6e4;background:#fff;cursor:pointer;font-size:16px;line-height:1;color:#444;\">−<\u002Fbutton>\n            <span style=\"min-width:20px;text-align:center;font-size:14px;font-weight:600;\">{{ fretCount }}<\u002Fspan>\n            <button onclick=\"{{ countPlus }}\" style=\"width:28px;height:28px;border-radius:7px;border:1px solid #e6e6e4;background:#fff;cursor:pointer;font-size:16px;line-height:1;color:#444;\">+<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9b9b9b;margin-bottom:8px;\">Tool<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;\">\n        <sc-for list=\"{{ toolBtns }}\" as=\"t\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-size:11px;color:#aaa;margin-top:7px;line-height:1.4;\">{{ toolHint }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9b9b9b;margin-bottom:10px;\">Dot color<\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\">\n        <sc-for list=\"{{ colorSwatches }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\"><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9b9b9b;margin-bottom:8px;\">Labels<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;\">\n        <button onclick=\"{{ setLabelNone }}\" style=\"{{ labelNoneStyle }}\">Plain<\u002Fbutton>\n        <button onclick=\"{{ setLabelDeg }}\" style=\"{{ labelDegStyle }}\">Degrees<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9b9b9b;margin-bottom:8px;\">Style direction<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;\">\n        <sc-for list=\"{{ themeBtns }}\" as=\"th\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ th.onClick }}\" style=\"{{ th.style }}\">{{ th.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto;display:flex;flex-direction:column;gap:9px;padding-top:8px;\">\n      <button onclick=\"{{ exportPng }}\" style=\"width:100%;padding:12px;border-radius:9px;border:none;background:#1d1d1d;color:#fff;cursor:pointer;font:700 13px/1 ui-monospace,Menlo,monospace;letter-spacing:.02em;\">Export PNG<\u002Fbutton>\n      <button onclick=\"{{ clearAll }}\" style=\"width:100%;padding:11px;border-radius:9px;border:1px solid #e6e6e4;background:#fff;color:#999;cursor:pointer;font:600 12.5px/1 ui-monospace,Menlo,monospace;\">Clear all<\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Faside>\n\n  <main style=\"flex:1;height:100%;overflow:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px;gap:16px;\">\n    <svg ref=\"{{ svgRef }}\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"{{ vb }}\" width=\"{{ w }}\" height=\"{{ h }}\" style=\"max-width:100%;max-height:78vh;height:auto;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 8px 30px rgba(0,0,0,.05);\">\n      <rect x=\"0\" y=\"0\" width=\"{{ w }}\" height=\"{{ h }}\" fill=\"{{ bg }}\"><\u002Frect>\n\n      <sc-for list=\"{{ inlays }}\" as=\"i\" hint-placeholder-count=\"6\">\n        <circle cx=\"{{ i.cx }}\" cy=\"{{ i.cy }}\" r=\"{{ i.r }}\" fill=\"{{ inlayColor }}\"><\u002Fcircle>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ fretLines }}\" as=\"ln\" hint-placeholder-count=\"13\">\n        <line x1=\"{{ ln.x1 }}\" y1=\"{{ ln.y1 }}\" x2=\"{{ ln.x2 }}\" y2=\"{{ ln.y2 }}\" stroke=\"{{ ln.stroke }}\" stroke-width=\"{{ ln.w }}\" stroke-linecap=\"round\"><\u002Fline>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ stringLines }}\" as=\"ln\" hint-placeholder-count=\"6\">\n        <line x1=\"{{ ln.x1 }}\" y1=\"{{ ln.y1 }}\" x2=\"{{ ln.x2 }}\" y2=\"{{ ln.y2 }}\" stroke=\"{{ ln.stroke }}\" stroke-width=\"{{ ln.w }}\" stroke-linecap=\"round\"><\u002Fline>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ fretNums }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <text x=\"{{ n.x }}\" y=\"{{ n.y }}\" fill=\"{{ numColor }}\" font-family=\"{{ tFont }}\" font-size=\"12\" text-anchor=\"middle\">{{ n.text }}<\u002Ftext>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ letters }}\" as=\"l\" hint-placeholder-count=\"6\">\n        <text x=\"{{ l.x }}\" y=\"{{ l.y }}\" fill=\"{{ letterColor }}\" font-family=\"{{ tFont }}\" font-size=\"13\" font-weight=\"600\" text-anchor=\"middle\">{{ l.text }}<\u002Ftext>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ marks }}\" as=\"m\" hint-placeholder-count=\"0\">\n        <sc-if value=\"{{ m.isOpen }}\" hint-placeholder-val=\"{{ true }}\">\n          <circle cx=\"{{ m.cx }}\" cy=\"{{ m.cy }}\" r=\"7\" fill=\"none\" stroke=\"{{ letterColor }}\" stroke-width=\"2\"><\u002Fcircle>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ m.isMute }}\" hint-placeholder-val=\"{{ false }}\">\n          <text x=\"{{ m.cx }}\" y=\"{{ m.cy }}\" fill=\"{{ letterColor }}\" font-family=\"{{ tFont }}\" font-size=\"17\" font-weight=\"700\" text-anchor=\"middle\" dominant-baseline=\"central\">×<\u002Ftext>\n        <\u002Fsc-if>\n      <\u002Fsc-for>\n\n      <text x=\"{{ titleX }}\" y=\"28\" fill=\"{{ titleColor }}\" font-family=\"{{ titleFont }}\" font-size=\"{{ titleSize }}\" font-weight=\"{{ titleWeight }}\" text-anchor=\"middle\">{{ title }}<\u002Ftext>\n\n      <sc-for list=\"{{ dots }}\" as=\"d\" hint-placeholder-count=\"12\">\n        <sc-if value=\"{{ d.isRoot }}\" hint-placeholder-val=\"{{ false }}\">\n          <rect x=\"{{ d.rectX }}\" y=\"{{ d.rectY }}\" width=\"30\" height=\"30\" rx=\"7\" fill=\"{{ d.color }}\"><\u002Frect>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ d.notRoot }}\" hint-placeholder-val=\"{{ true }}\">\n          <circle cx=\"{{ d.cx }}\" cy=\"{{ d.cy }}\" r=\"15\" fill=\"{{ d.color }}\"><\u002Fcircle>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ d.showLabel }}\" hint-placeholder-val=\"{{ true }}\">\n          <text x=\"{{ d.cx }}\" y=\"{{ d.cy }}\" fill=\"#ffffff\" font-family=\"{{ tFont }}\" font-size=\"12.5\" font-weight=\"700\" text-anchor=\"middle\" dominant-baseline=\"central\">{{ d.deg }}<\u002Ftext>\n        <\u002Fsc-if>\n      <\u002Fsc-for>\n\n      <sc-for list=\"{{ cells }}\" as=\"c\" hint-placeholder-count=\"0\">\n        <rect x=\"{{ c.x }}\" y=\"{{ c.y }}\" width=\"{{ c.w }}\" height=\"{{ c.h }}\" fill=\"transparent\" style=\"cursor:pointer\" onclick=\"{{ c.onClick }}\"><\u002Frect>\n      <\u002Fsc-for>\n    <\u002Fsvg>\n    <div style=\"font-size:11px;color:#a8a8a6;text-align:center;max-width:520px;line-height:1.5;\">Click a fret to place a dot · click the nut edge to cycle open ○ / mute × · use the <b style=\"color:#7a7a78;\">Root<\u002Fb> tool on any dot to set the key and show degrees<\u002Fdiv>\n  <\u002Fmain>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;700px&quot;},&quot;startOrientation&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;horizontal&quot;,&quot;vertical&quot;],&quot;default&quot;:&quot;horizontal&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Defaults&quot;},&quot;startTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;lines&quot;,&quot;classic&quot;,&quot;bold&quot;],&quot;default&quot;:&quot;lines&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Defaults&quot;},&quot;startLabels&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;none&quot;,&quot;degrees&quot;],&quot;default&quot;:&quot;degrees&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Defaults&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    title: 'A minor pentatonic',\n    orientation: 'horizontal',\n    startFret: 0,\n    fretCount: 12,\n    labelMode: 'degrees',\n    tool: 'dot',\n    activeColor: '#222222',\n    theme: 'lines',\n    rootPc: 9,\n    dots: {\n      '0:5':{color:'#222222'},'0:8':{color:'#222222'},\n      '1:5':{color:'#222222'},'1:7':{color:'#222222'},\n      '2:5':{color:'#222222'},'2:7':{color:'#222222'},\n      '3:5':{color:'#222222'},'3:7':{color:'#222222'},\n      '4:5':{color:'#222222'},'4:8':{color:'#222222'},\n      '5:5':{color:'#222222'},'5:8':{color:'#222222'}\n    },\n    marks: {}\n  };\n\n  NSTR = 6;\n  OPEN_PC = [4,9,2,7,11,4];\n  STR_LETTERS = ['E','A','D','G','B','e'];\n  COLORS = ['#222222','#2563c9','#cf3a3a','#1f9d57','#d98a1f'];\n  DEG = ['1','b2','2','b3','3','4','b5','5','b6','6','b7','7'];\n  THEMES = {\n    lines:   { bg:'#ffffff', fret:'#dcdcdc', fretW:1.5, nut:'#3a3a3a', nutW:5, string:'#cdcdcd', stringW:1.5, inlay:'#ededed', num:'#b3b3b3', letter:'#9a9a9a', font:\"ui-monospace,'SF Mono',Menlo,monospace\", titleFont:\"ui-monospace,Menlo,monospace\", titleColor:'#222', titleSize:18, titleWeight:600 },\n    classic: { bg:'#faf7f1', fret:'#bcb2a1', fretW:2, nut:'#6b5d49', nutW:6, string:'#c7bca7', stringW:2, inlay:'#e9e1d2', num:'#a99a86', letter:'#8a7d68', font:\"Georgia,'Times New Roman',serif\", titleFont:\"Georgia,serif\", titleColor:'#4a3f30', titleSize:20, titleWeight:600 },\n    bold:    { bg:'#ffffff', fret:'#272727', fretW:3, nut:'#000000', nutW:8, string:'#2e2e2e', stringW:3, inlay:'#dadada', num:'#555555', letter:'#3a3a3a', font:\"'Helvetica Neue',Arial,sans-serif\", titleFont:\"'Helvetica Neue',Arial,sans-serif\", titleColor:'#000', titleSize:20, titleWeight:800 }\n  };\n\n  componentDidMount(){\n    const p = this.props || {};\n    const patch = {};\n    if(p.startOrientation) patch.orientation = p.startOrientation;\n    if(p.startTheme) patch.theme = p.startTheme;\n    if(p.startLabels) patch.labelMode = p.startLabels;\n    if(Object.keys(patch).length) this.setState(patch);\n  }\n\n  pcOf(s,f){ return (this.OPEN_PC[s]+f)%12; }\n\n  setTitle = (e)=> this.setState({title: e.target.value});\n  setOrientH = ()=> this.setState({orientation:'horizontal'});\n  setOrientV = ()=> this.setState({orientation:'vertical'});\n  setLabelNone = ()=> this.setState({labelMode:'none'});\n  setLabelDeg = ()=> this.setState({labelMode:'degrees'});\n\n  startMinus = ()=> this.setState(s=>({startFret: Math.max(0, s.startFret-1)}));\n  startPlus  = ()=> this.setState(s=>({startFret: Math.min(22, s.startFret+1, 24-s.fretCount)}));\n  countMinus = ()=> this.setState(s=>({fretCount: Math.max(4, s.fretCount-1)}));\n  countPlus  = ()=> this.setState(s=>({fretCount: Math.min(17, s.fretCount+1, 24-s.startFret)}));\n\n  clearAll = ()=> this.setState({dots:{}, marks:{}, rootPc:null});\n\n  clickCell(s,f){\n    const d = {...this.state.dots};\n    const k = s+':'+f;\n    if(this.state.tool==='erase'){ delete d[k]; this.setState({dots:d}); return; }\n    if(this.state.tool==='root'){\n      const pc = this.pcOf(s,f);\n      if(!d[k]) d[k] = {color:this.state.activeColor};\n      this.setState({dots:d, rootPc: this.state.rootPc===pc ? null : pc});\n      return;\n    }\n    if(d[k]){\n      if(d[k].color===this.state.activeColor) delete d[k];\n      else d[k] = {color:this.state.activeColor};\n    } else {\n      d[k] = {color:this.state.activeColor};\n    }\n    this.setState({dots:d});\n  }\n\n  clickOpen(s){\n    const m = {...this.state.marks};\n    const cur = m[s];\n    const next = cur==='open' ? 'mute' : cur==='mute' ? null : 'open';\n    if(next) m[s] = next; else delete m[s];\n    this.setState({marks:m});\n  }\n\n  exportPng = ()=>{\n    const svg = this._svg;\n    if(!svg) return;\n    const w = parseFloat(svg.getAttribute('width'));\n    const h = parseFloat(svg.getAttribute('height'));\n    const xml = new XMLSerializer().serializeToString(svg);\n    const src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(xml);\n    const img = new Image();\n    img.onload = ()=>{\n      const scale = 2;\n      const cv = document.createElement('canvas');\n      cv.width = w*scale; cv.height = h*scale;\n      const ctx = cv.getContext('2d');\n      ctx.fillStyle = this.THEMES[this.state.theme].bg;\n      ctx.fillRect(0,0,cv.width,cv.height);\n      ctx.drawImage(img,0,0,cv.width,cv.height);\n      cv.toBlob((blob)=>{\n        const url = URL.createObjectURL(blob);\n        const a = document.createElement('a');\n        a.href = url;\n        a.download = (this.state.title||'fretboard').replace(/[^a-z0-9-_ ]/gi,'').trim() + '.png';\n        document.body.appendChild(a); a.click(); a.remove();\n        setTimeout(()=>URL.revokeObjectURL(url), 2000);\n      }, 'image/png');\n    };\n    img.src = src;\n  };\n\n  renderVals(){\n    const st = this.state;\n    const T = this.THEMES[st.theme];\n    const NS = this.NSTR;\n    const start = st.startFret, count = st.fretCount;\n    const horiz = st.orientation==='horizontal';\n    const fretLen = 54, strGap = 38;\n    const titleH = 46;\n    const leftPad = horiz ? 60 : 50;\n    const topPad = titleH + (horiz ? 22 : 38);\n    const boardW = horiz ? count*fretLen : (NS-1)*strGap;\n    const boardH = horiz ? (NS-1)*strGap : count*fretLen;\n    const rightPad = 28, botPad = horiz ? 36 : 30;\n    const w = leftPad + boardW + rightPad;\n    const h = topPad + boardH + botPad;\n\n    const stringPos = s => horiz ? topPad + (NS-1-s)*strGap : leftPad + s*strGap;\n    const fretAxis = f => (horiz ? leftPad : topPad) + (f-start)*fretLen;\n    const cellCenter = f => (horiz ? leftPad : topPad) + (f-start-0.5)*fretLen;\n    const midPerp = horiz ? topPad + boardH/2 : leftPad + boardW/2;\n\n    // string lines\n    const stringLines = [];\n    for(let s=0;s<NS;s++){\n      const p = stringPos(s);\n      if(horiz) stringLines.push({x1:leftPad,y1:p,x2:leftPad+boardW,y2:p,stroke:T.string,w:T.stringW});\n      else stringLines.push({x1:p,y1:topPad,x2:p,y2:topPad+boardH,stroke:T.string,w:T.stringW});\n    }\n    // fret lines\n    const fretLines = [];\n    for(let f=start; f<=start+count; f++){\n      const a = fretAxis(f);\n      const isNut = (f===0);\n      const stroke = isNut ? T.nut : T.fret;\n      const ww = isNut ? T.nutW : T.fretW;\n      if(horiz) fretLines.push({x1:a,y1:topPad,x2:a,y2:topPad+boardH,stroke,w:ww});\n      else fretLines.push({x1:leftPad,y1:a,x2:leftPad+boardW,y2:a,stroke,w:ww});\n    }\n    // inlays\n    const single = [3,5,7,9,15,17,19,21];\n    const dbl = [12,24];\n    const inlays = [];\n    for(let f=start+1; f<=start+count; f++){\n      const a = cellCenter(f);\n      if(single.includes(f)){\n        inlays.push(horiz ? {cx:a,cy:midPerp,r:5} : {cx:midPerp,cy:a,r:5});\n      } else if(dbl.includes(f)){\n        const off = strGap;\n        if(horiz){ inlays.push({cx:a,cy:midPerp-off,r:5}); inlays.push({cx:a,cy:midPerp+off,r:5}); }\n        else { inlays.push({cx:midPerp-off,cy:a,r:5}); inlays.push({cx:midPerp+off,cy:a,r:5}); }\n      }\n    }\n    // fret numbers\n    const fretNums = [];\n    for(let f=start+1; f<=start+count; f++){\n      if(single.includes(f) || dbl.includes(f)){\n        const a = cellCenter(f);\n        fretNums.push(horiz ? {x:a,y:topPad+boardH+24,text:String(f)} : {x:leftPad-24,y:a+4,text:String(f)});\n      }\n    }\n    // string letters\n    const letters = [];\n    for(let s=0;s<NS;s++){\n      const p = stringPos(s);\n      letters.push(horiz ? {x:leftPad-36,y:p+5,text:this.STR_LETTERS[s]} : {x:p,y:topPad-34,text:this.STR_LETTERS[s]});\n    }\n    // open/mute marks\n    const marks = [];\n    for(let s=0;s<NS;s++){\n      const m = st.marks[s];\n      if(!m) continue;\n      const p = stringPos(s);\n      const isOpen = m==='open', isMute = m==='mute';\n      marks.push(horiz ? {isOpen,isMute,cx:leftPad-16,cy:p} : {isOpen,isMute,cx:p,cy:topPad-16});\n    }\n    // dots\n    const dots = [];\n    Object.keys(st.dots).forEach(k=>{\n      const parts = k.split(':'); const s = +parts[0], f = +parts[1];\n      if(f < start+1 || f > start+count) return;\n      const cx = horiz ? cellCenter(f) : stringPos(s);\n      const cy = horiz ? stringPos(s) : cellCenter(f);\n      const pc = this.pcOf(s,f);\n      const isRoot = st.rootPc!=null && pc===st.rootPc;\n      const deg = st.rootPc!=null ? this.DEG[(pc-st.rootPc+12)%12] : '';\n      const showLabel = st.labelMode==='degrees' && st.rootPc!=null;\n      dots.push({cx,cy,color:st.dots[k].color,isRoot,notRoot:!isRoot,deg,showLabel,rectX:cx-15,rectY:cy-15});\n    });\n    // click cells\n    const cells = [];\n    for(let s=0;s<NS;s++){\n      if(start===0){\n        const p = stringPos(s);\n        if(horiz) cells.push({x:leftPad-32,y:p-strGap/2,w:32,h:strGap,onClick:()=>this.clickOpen(s)});\n        else cells.push({x:p-strGap/2,y:topPad-32,w:strGap,h:32,onClick:()=>this.clickOpen(s)});\n      }\n      for(let f=start+1; f<=start+count; f++){\n        if(horiz) cells.push({x:leftPad+(f-start-1)*fretLen,y:stringPos(s)-strGap/2,w:fretLen,h:strGap,onClick:()=>this.clickCell(s,f)});\n        else cells.push({x:stringPos(s)-strGap/2,y:topPad+(f-start-1)*fretLen,w:strGap,h:fretLen,onClick:()=>this.clickCell(s,f)});\n      }\n    }\n\n    // control styles\n    const TGL_BASE = 'flex:1;display:flex;align-items:center;justify-content:center;padding:9px 6px;border-radius:8px;border:1px solid #e6e6e4;background:#fff;cursor:pointer;font:600 12.5px/1 ui-monospace,Menlo,monospace;color:#555;letter-spacing:.01em;';\n    const TGL_ON = 'border-color:#1d1d1d;background:#1d1d1d;color:#fff;';\n    const tgl = a => TGL_BASE + (a?TGL_ON:'');\n    const sw = (c,a) => `width:30px;height:30px;border-radius:50%;cursor:pointer;background:${c};border:2px solid #fff;box-shadow:0 0 0 ${a?'2px #1d1d1d':'1px #dcdcdc'};padding:0;`;\n\n    const toolDefs = [{k:'dot',l:'Dot'},{k:'root',l:'Root'},{k:'erase',l:'Erase'}];\n    const toolBtns = toolDefs.map(t=>({label:t.l, style:tgl(st.tool===t.k), onClick:()=>this.setState({tool:t.k})}));\n    const themeDefs = [{k:'lines',l:'Lines'},{k:'classic',l:'Classic'},{k:'bold',l:'Bold'}];\n    const themeBtns = themeDefs.map(t=>({label:t.l, style:tgl(st.theme===t.k), onClick:()=>this.setState({theme:t.k})}));\n    const colorSwatches = this.COLORS.map(c=>({style:sw(c, st.activeColor===c), onClick:()=>this.setState({activeColor:c})}));\n\n    const toolHints = {\n      dot:'Place / remove dots in the active color.',\n      root:'Tap a dot to set the key — degrees update everywhere.',\n      erase:'Tap any dot to remove it.'\n    };\n\n    return {\n      // board\n      vb:`0 0 ${w} ${h}`, w, h, bg:T.bg,\n      inlayColor:T.inlay, numColor:T.num, letterColor:T.letter, tFont:T.font,\n      titleX:w/2, titleColor:T.titleColor, titleFont:T.titleFont, titleSize:T.titleSize, titleWeight:T.titleWeight,\n      stringLines, fretLines, inlays, fretNums, letters, marks, dots, cells,\n      svgRef:(el)=>{ this._svg = el; },\n      // controls\n      title:st.title, setTitle:this.setTitle,\n      orientHStyle:tgl(horiz), orientVStyle:tgl(!horiz), setOrientH:this.setOrientH, setOrientV:this.setOrientV,\n      fretRangeText:`${start}–${start+count}`, startFret:start, fretCount:count,\n      startMinus:this.startMinus, startPlus:this.startPlus, countMinus:this.countMinus, countPlus:this.countPlus,\n      toolBtns, toolHint:toolHints[st.tool],\n      colorSwatches,\n      labelNoneStyle:tgl(st.labelMode==='none'), labelDegStyle:tgl(st.labelMode==='degrees'),\n      setLabelNone:this.setLabelNone, setLabelDeg:this.setLabelDeg,\n      themeBtns,\n      exportPng:this.exportPng, clearAll:this.clearAll\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
